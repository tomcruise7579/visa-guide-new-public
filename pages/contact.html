<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact Us - Global Visa Guide</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo"><i class="fas fa-passport"></i> <span>Global Visa Guide</span></div>
      <ul class="nav-menu">
        <li><a href="../index.html#home">Home</a></li>
        <li><a href="../pages/blog.html">Blog</a></li>
      </ul>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <div class="container section">
    <h1>Contact Us</h1>
    <p>We’re here to help — send us a message and we’ll respond as soon as possible.</p>

    <section class="info-section">
      <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid var(--border-color)">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid var(--border-color)">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid var(--border-color)"></textarea>
        <button type="submit" class="btn">Send Message</button>
        <p id="contactStatus" style="margin-top:10px;color:var(--text-light)"></p>
      </form>
    </section>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section"><h4>Quick Links</h4><ul><li><a href="../index.html">Home</a></li><li><a href="checklist.html">Checklist</a></li><li><a href="faq.html">FAQ</a></li><li><a href="privacy.html">Privacy Policy</a></li><li><a href="terms.html">Terms & Conditions</a></li></ul></div>
      </div>
      <div class="footer-bottom"><p>&copy; 2026 Global Visa Guide. All rights reserved.</p></div>
    </div>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      // Placeholder: no backend in this static site. Show success message.
      document.getElementById('contactStatus').textContent = 'Thank you — your message has been recorded locally for demo purposes.';
      this.reset();
    });
  </script>
</body>
</html>
